name: Release Drafter

on:
  push:
    branches: [main]
  # Needed by the autolabeler job.
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: release-drafter-${{ github.ref }}
  cancel-in-progress: true

# release-drafter v7 splits the drafter and the autolabeler into two actions,
# so they run as separate jobs gated on the event.
jobs:
  draft:
    if: github.event_name == 'push'
    permissions:
      contents: write # create / update the release draft
      pull-requests: read # read merged PRs to build the notes
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  autolabel:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write # apply category + release/* labels to the PR
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter/autolabeler@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
