name: Release

# Releases are cut by publishing the draft GitHub Release that release-drafter
# maintains: publishing it creates the tag and fires this event. Local tag
# pushes no longer trigger a release.
on:
  release:
    types: [published]

# Only the GitHub Release upload needs write access; formula publishing to the
# tap uses the dedicated HOMEBREW_TAP_TOKEN secret, not GITHUB_TOKEN.
permissions:
  contents: write

# Never cancel a half-published release. Fixed group name (no ref) serialises
# concurrent publishes instead of racing them.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: release
    # macOS is required: the Keychain backend needs CGO_ENABLED=1 with
    # Security.framework. An arm64 runner cross-compiles darwin/amd64 fine.
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      # Check out the published tag (not the release's target branch) so Go's
      # VCS stamping resolves the version; fetch-depth: 0 gives goreleaser the
      # full history for the changelog.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: goreleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
